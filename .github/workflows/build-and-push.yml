name: Build & Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="ghcr.io/${{ github.repository }}:latest"
            LOCAL_TAG="furniture-xhl2yk:latest"

            docker pull "$IMAGE"
            docker tag "$IMAGE" "$LOCAL_TAG"

            # Update Docker Swarm service (managed by Dokploy)
            docker service update --image "$LOCAL_TAG" furniture-xhl2yk 2>/dev/null || \
              docker service update --image "$LOCAL_TAG" mazaya-xhl2yk 2>/dev/null || \
              echo "SERVICE_UPDATE_FAILED"

            # Also update the dedicated container if it exists
            docker stop furniture-xhl2yk 2>/dev/null || true
            docker rm furniture-xhl2yk 2>/dev/null || true

            # Extract env vars from old Swarm task
            SWARM_TASK=$(docker ps --filter name=furniture --format '{{.Names}}' | head -1)
            if [ -n "$SWARM_TASK" ]; then
              NET=$(docker inspect "$SWARM_TASK" --format '{{(index .NetworkSettings.Networks "dokploy-network").IPAddress}}' 2>/dev/null || echo dokploy-network)
            else
              NET="dokploy-network"
            fi

