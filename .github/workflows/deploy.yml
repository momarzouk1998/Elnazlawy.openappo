# ========================================
# Deploy to Server — SSH-First Approach
# Mirrors mazaya pattern on the SAME server, different service name
# ========================================

name: Deploy to Server

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "=== [1/6] Pulling latest image from GHCR ==="
            docker pull ghcr.io/momarzouk1998/elnazlawy.openappo:latest

            echo "=== [2/6] Tagging local image ==="
            docker tag ghcr.io/momarzouk1998/elnazlawy.openappo:latest elnazlawy-x9y8z7:latest

            echo "=== [3/6] Updating swarm service ==="
            docker service update --image elnazlawy-x9y8z7:latest --force elnazlawy-x9y8z7

            echo "=== [4/6] Waiting 20s for service to settle ==="
            sleep 20

            echo "=== [5/6] Service status ==="
            docker service ps elnazlawy-x9y8z7 --no-trunc

            echo ""
            echo "=== Internal health check ==="
            curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" http://127.0.0.1:3002/ || echo "Internal check failed"

            echo "=== External health check ==="
            curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" https://elnazlawy.openappo.com/ || echo "External check failed"

            echo "=== [6/6] Cleaning up old images ==="
            docker image prune -f

            echo ""
            echo "=== Deployment complete ==="
