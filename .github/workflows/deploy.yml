# ========================================
# Deploy to Server — SSH-First Approach
# Waits for Build & Push to GHCR to finish first
# Uses GITHUB_TOKEN (auto-provisioned) to pull the image.
# ========================================

name: Deploy to Server

on:
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # Image name MUST match what build-and-push.yml pushes.
            # github.repository = "momarzouk1998/Elnazlawy.openappo" (capital E)
            # But GHCR normalizes the package name to lowercase: "elnazlawy.openappo"
            # NOTE on port 3005:
            #   elnazlawy.openappo.com previously pointed at the mazaya container on 3002.
            #   We moved elnazlawy to host:3005 -> container:3000 to avoid the conflict.
            #   You still need to update the Caddy/Nginx upstream for elnazlawy.openappo.com
            #   to point at 127.0.0.1:3005 (we do NOT touch your reverse proxy here).
            GHCR_IMAGE="ghcr.io/momarzouk1998/elnazlawy.openappo:latest"
            LOCAL_IMAGE="elnazlawy-x9y8z7:latest"
            HOST_PORT=3005
            APP_PORT=3005

            # GITHUB_TOKEN is auto-provisioned by GitHub Actions and is valid
            # for the lifetime of this job. It has `packages: read` because
            # of the `permissions:` block above, which lets us pull the image
            # this repo pushed in the build step.
            GH_USER="${{ github.actor }}"
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"

            echo "=== [1/8] Logging in to GHCR (using auto-provisioned GITHUB_TOKEN) ==="
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_USER" --password-stdin

            echo "=== [2/8] Pulling latest image from GHCR ==="
            docker pull "$GHCR_IMAGE"

            echo "=== [3/8] Tagging local image ==="
            docker tag "$GHCR_IMAGE" "$LOCAL_IMAGE"
            echo "  Tagged as $LOCAL_IMAGE"

            echo "=== [4/8] Logging out of GHCR (rotate credentials) ==="
            docker logout ghcr.io >/dev/null

            echo "=== [5/8] Ensure env file exists on the host ==="
            ENV_FILE=/tmp/elnazlawy.env
            if [ -f /opt/elnazlawy/.env ]; then
              cp /opt/elnazlawy/.env "$ENV_FILE"
              echo "  Loaded environment file from /opt/elnazlawy/.env"
            else
              echo "  /opt/elnazlawy/.env not found — creating an empty env file"
              : > "$ENV_FILE"
            fi

            echo "=== [6/8] Recreate swarm service with the latest image ==="
            docker service rm elnazlawy-x9y8z7 >/dev/null 2>&1 || true
            ENV_FLAGS=(--env NODE_ENV=production --env PORT=${APP_PORT})
            [ -n "${{ secrets.DATABASE_URL }}" ] && ENV_FLAGS+=(--env DATABASE_URL="${{ secrets.DATABASE_URL }}")
            [ -n "${{ secrets.NEXTAUTH_SECRET }}" ] && ENV_FLAGS+=(--env NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}")
            [ -n "${{ secrets.NEXTAUTH_URL }}" ] && ENV_FLAGS+=(--env NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}")
            docker service create \
              --name elnazlawy-x9y8z7 \
              --replicas 1 \
              --network host \
              --env-file "$ENV_FILE" \
              "${ENV_FLAGS[@]}" \
              --restart-condition on-failure \
              --restart-max-attempts 5 \
              "$LOCAL_IMAGE"

            echo "=== [7/8] Waiting 25s for service to settle ==="
            sleep 25

            echo "=== Service status ==="
            docker service ps elnazlawy-x9y8z7 --no-trunc

            echo ""
            echo "=== Internal health check (127.0.0.1:${HOST_PORT}) ==="
            INT_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://127.0.0.1:${HOST_PORT}/" || echo "000")
            echo "HTTP: $INT_CODE"
            if [ "$INT_CODE" = "000" ]; then
              echo "  -> ${HOST_PORT} not listening, trying 3000..."
              INT_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/ || echo "000")
              echo "HTTP (3000): $INT_CODE"
            fi

            echo "=== External health check (https://elnazlawy.openappo.com) ==="
            EXT_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://elnazlawy.openappo.com/ || echo "000")
            echo "HTTP: $EXT_CODE"

            echo "=== [8/8] Cleaning up old images ==="
            docker image prune -f

            echo ""
            echo "=== Deployment complete ==="
