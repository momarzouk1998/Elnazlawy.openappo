# ========================================
# Self-Hosted Runner Approach
# ========================================
# This workflow uses a runner that lives on the production server itself.
# The server pulls new code, builds, and updates its own service.
# No SSH, no secrets, no network issues.
# ========================================

name: Deploy to Server

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    # The runner "mazaya-runner" must be registered on the server.
    # See DEPLOY_RUNNER_SETUP.md for setup instructions.
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest image from GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/momarzouk1998/mazaya.openappo:latest

      - name: Update local image tag
        run: |
          docker tag ghcr.io/momarzouk1998/mazaya.openappo:latest furniture-xhl2yk:latest

      - name: Update swarm service
        run: |
          docker service update --image furniture-xhl2yk:latest --force furniture-xhl2yk
          echo "Service update triggered."

      - name: Wait for service to settle
        run: sleep 10

      - name: Verify service status
        run: |
          echo "=== Service status ==="
          docker service ps furniture-xhl2yk --no-trunc
          echo ""
          echo "=== Container logs (last 40 lines) ==="
          CONTAINER_ID=$(docker ps --filter name=furniture-xhl2yk -q | head -1)
          if [ -n "$CONTAINER_ID" ]; then
            docker logs "$CONTAINER_ID" --tail 40
          else
            docker service logs furniture-xhl2yk --tail 40
          fi
          echo ""
          echo "=== Internal health check ==="
          curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" http://127.0.0.1:3001/ || echo "Internal check failed"

      - name: External health check
        run: |
          echo "=== External health check ==="
          curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" https://mazaya.openappo.com/ || echo "External check failed"
