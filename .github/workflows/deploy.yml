# ========================================
# Deploy to Server — Hybrid Approach
# ========================================
# 1) يحاول Self-Hosted Runner أولاً (لو شغال)
# 2) لو فشل، يعمل deploy عبر SSH (fallback)
# ========================================

name: Deploy to Server

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # ========================================
  # Job 1: Self-Hosted Runner Approach
  # ========================================
  deploy-self-hosted:
    name: Deploy via Self-Hosted Runner
    runs-on: self-hosted
    continue-on-error: true   # حتى لو فشل، الـ SSH job يكمل
    steps:
      - name: Pull latest image from GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/momarzouk1998/mazaya.openappo:latest

      - name: Update local image tag
        run: |
          docker tag ghcr.io/momarzouk1998/mazaya.openappo:latest furniture-xhl2yk:latest

      - name: Update swarm service
        run: |
          docker service update --image furniture-xhl2yk:latest --force furniture-xhl2yk
          echo "Service update triggered."

      - name: Wait for service to settle
        run: sleep 10

      - name: Verify service status
        run: |
          echo "=== Service status ==="
          docker service ps furniture-xhl2yk --no-trunc
          echo ""
          echo "=== Internal health check ==="
          curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" http://127.0.0.1:3001/ || echo "Internal check failed"

  # ========================================
  # Job 2: SSH Fallback
  # ========================================
  deploy-ssh:
    name: Deploy via SSH (Fallback)
    needs: deploy-self-hosted
    if: failure()   # لو الـ self-hosted فشل، الـ SSH يكمل
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "=== Pulling latest image ==="
            docker pull ghcr.io/momarzouk1998/mazaya.openappo:latest

            echo "=== Tagging local image ==="
            docker tag ghcr.io/momarzouk1998/mazaya.openappo:latest furniture-xhl2yk:latest

            echo "=== Updating swarm service ==="
            docker service update --image furniture-xhl2yk:latest --force furniture-xhl2yk

            echo "=== Waiting 10s for service to settle ==="
            sleep 10

            echo "=== Service status ==="
            docker service ps furniture-xhl2yk --no-trunc

            echo "=== Internal health check ==="
            curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" http://127.0.0.1:3001/ || echo "Internal check failed"

            echo "=== External health check ==="
            curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" https://mazaya.openappo.com/ || echo "External check failed"

            echo "=== Cleaning up old images ==="
            docker image prune -f
