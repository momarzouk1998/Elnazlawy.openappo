# ========================================
# Deploy to Server — SSH-First Approach
# ========================================
# Strategy: SSH direct from GitHub (works every time)
# - No self-hosted runner needed
# - No external dependencies
# - Reliable deployment
# ========================================

name: Deploy to Server

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "=== [1/6] Pulling latest image from GHCR ==="
            docker pull ghcr.io/momarzouk1998/mazaya.openappo:latest

            echo "=== [2/6] Tagging local image ==="
            docker tag ghcr.io/momarzouk1998/mazaya.openappo:latest furniture-xhl2yk:latest

            echo "=== [3/6] Updating swarm service ==="
            docker service update --image furniture-xhl2yk:latest --force furniture-xhl2yk

            echo "=== [4/6] Waiting 15s for service to settle ==="
            sleep 15

            echo "=== [5/6] Service status ==="
            docker service ps furniture-xhl2yk --no-trunc

            echo ""
            echo "=== Internal health check ==="
            curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" http://127.0.0.1:3001/ || echo "Internal check failed"

            echo "=== External health check ==="
            curl -s -o /dev/null -w "HTTP: %{http_code} | Time: %{time_total}s\n" https://mazaya.openappo.com/ || echo "External check failed"

            echo "=== [6/6] Cleaning up old images ==="
            docker image prune -f

            echo ""
            echo "=== Deployment complete ==="
