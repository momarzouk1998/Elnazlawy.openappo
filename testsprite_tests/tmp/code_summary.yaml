version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 15
  - React 19
  - Tailwind CSS 4
  - Prisma ORM
  - Zustand (state management)
  - PostgreSQL
  - JWT authentication (jose)
  - bcryptjs
  - recharts (charts)
  - xlsx (Excel export)
  - Heroicons
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: "Root redirect - redirects to /dashboard if logged in, /login if not"
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: "User login page with username/password, remember me, show/hide password"
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: "Main dashboard with inventory value, open orders, completed orders, financial balance, recent journal entries"
  - path: /orders
    file: src/app/orders/page.tsx
    auth_required: true
    description: "Orders list with search, filter by branch/status/type/date, pagination, delete, export to Excel"
  - path: /orders/new
    file: src/app/orders/new/page.tsx
    auth_required: true
    description: "Create new order form"
  - path: /orders/[id]
    file: src/app/orders/[id]/page.tsx
    auth_required: true
    description: "Order detail page with view/edit/invoice actions"
  - path: /orders/[id]/edit
    file: src/app/orders/[id]/edit/page.tsx
    auth_required: true
    description: "Edit order page"
  - path: /orders/[id]/invoice
    file: src/app/orders/[id]/invoice/page.tsx
    auth_required: true
    description: "Print order invoice"
  - path: /customers
    file: src/app/customers/page.tsx
    auth_required: true
    description: "Customers list with search, inline create/edit, export to Excel"
  - path: /customers/new
    file: src/app/customers/new/page.tsx
    auth_required: true
    description: "Create new customer form"
  - path: /customers/[id]
    file: src/app/customers/[id]/page.tsx
    auth_required: true
    description: "Customer detail page"
  - path: /suppliers
    file: src/app/suppliers/page.tsx
    auth_required: true
    description: "Suppliers list with search, inline create/edit, payment type field, export to Excel"
  - path: /suppliers/new
    file: src/app/suppliers/new/page.tsx
    auth_required: true
    description: "Create new supplier form"
  - path: /suppliers/[id]
    file: src/app/suppliers/[id]/page.tsx
    auth_required: true
    description: "Supplier detail page"
  - path: /branches
    file: src/app/branches/page.tsx
    auth_required: true
    description: "Branches (showrooms) list with search, inline create/edit, export to Excel"
  - path: /branches/new
    file: src/app/branches/new/page.tsx
    auth_required: true
    description: "Create new branch form"
  - path: /branches/[id]
    file: src/app/branches/[id]/page.tsx
    auth_required: true
    description: "Branch detail page"
  - path: /workers
    file: src/app/workers/page.tsx
    auth_required: true
    description: "Workers list with search, inline create/edit, expense totals per worker, export to Excel"
  - path: /workers/new
    file: src/app/workers/new/page.tsx
    auth_required: true
    description: "Create new worker form"
  - path: /contractors
    file: src/app/contractors/page.tsx
    auth_required: true
    description: "Contractors list with search, inline create/edit, export to Excel"
  - path: /contractors/new
    file: src/app/contractors/new/page.tsx
    auth_required: true
    description: "Create new contractor form"
  - path: /contractors/[id]
    file: src/app/contractors/[id]/page.tsx
    auth_required: true
    description: "Contractor detail page"
  - path: /accessories
    file: src/app/accessories/page.tsx
    auth_required: true
    description: "Accessories inventory list with search, inline create/edit, purchase button, export to Excel"
  - path: /accessories/new
    file: src/app/accessories/new/page.tsx
    auth_required: true
    description: "Create new accessory item form"
  - path: /accessories/buy
    file: src/app/accessories/buy/page.tsx
    auth_required: true
    description: "Buy accessories - add inventory from supplier"
  - path: /accessories/[id]
    file: src/app/accessories/[id]/page.tsx
    auth_required: true
    description: "Accessory detail page"
  - path: /boards
    file: src/app/boards/page.tsx
    auth_required: true
    description: "Boards inventory list with search, inline create/edit, purchase button, export to Excel"
  - path: /boards/new
    file: src/app/boards/new/page.tsx
    auth_required: true
    description: "Create new board item form"
  - path: /boards/buy
    file: src/app/boards/buy/page.tsx
    auth_required: true
    description: "Buy boards - add inventory from supplier"
  - path: /boards/[id]
    file: src/app/boards/[id]/page.tsx
    auth_required: true
    description: "Board detail page"
  - path: /journal
    file: src/app/journal/page.tsx
    auth_required: true
    description: "Financial journal entries list with filters, CRUD operations"
  - path: /journal/new
    file: src/app/journal/new/page.tsx
    auth_required: true
    description: "Create new journal entry form"
  - path: /journal/summary
    file: src/app/journal/summary/page.tsx
    auth_required: true
    description: "Journal financial summary report"
  - path: /overhead
    file: src/app/overhead/page.tsx
    auth_required: true
    description: "Overhead expenses list with search, date filter, inline create/edit, export to Excel"
  - path: /overhead/new
    file: src/app/overhead/new/page.tsx
    auth_required: true
    description: "Create new overhead expense form"
  - path: /reports
    file: src/app/reports/page.tsx
    auth_required: true
    description: "Reports page with multiple report types - inventory, orders, cashflow, suppliers, overhead, workers"
  - path: /profile
    file: src/app/profile/page.tsx
    auth_required: true
    description: "User profile page with change password form"
  - path: /admin/users
    file: src/app/admin/users/page.tsx
    auth_required: true
    description: "Admin user management page - create/edit/deactivate users, set roles, branches, visible modules"
  - path: /admin/material-types
    file: src/app/admin/material-types/page.tsx
    auth_required: true
    description: "Admin material types management - create/edit material types for boards and accessories categories"
features:
  - name: User Authentication (Login)
    description: "Login with username and password, remember me option, show/hide password toggle"
    files:
      - src/app/login/page.tsx
      - src/hooks/useApi.ts
    entry_route: /login
    user_interactions:
      - Fill username input field
      - Fill password input field
      - Toggle show/hide password button
      - Check remember me checkbox
      - Click login button to submit
      - See error message on invalid credentials
      - Successful login redirects to /dashboard
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Root Redirect
    description: "Root page redirects authenticated users to /dashboard, unauthenticated to /login"
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Visit root URL - should redirect based on auth state
    api_calls: []
    auth_required: false
  - name: Dashboard
    description: "Main dashboard showing inventory value, open orders, completed orders this month, current balance, active suppliers, income/expenses, recent 5 journal entries"
    files:
      - src/app/dashboard/page.tsx
    entry_route: /dashboard
    user_interactions:
      - View inventory value metric card
      - View open orders count
      - View completed orders this month count
      - View current balance metric card
      - View active suppliers count
      - View total income/expenses
      - View recent 5 financial journal entries
      - Click link to view all journal entries
    api_calls:
      - method: GET
        endpoint: /api/boards_inventory
      - method: GET
        endpoint: /api/accessories_inventory
      - method: GET
        endpoint: /api/orders
      - method: GET
        endpoint: /api/journal
      - method: GET
        endpoint: /api/suppliers
    auth_required: true
  - name: Orders Management
    description: "Full CRUD for orders - list, search, filter, create, view detail, edit, invoice print, delete"
    files:
      - src/app/orders/page.tsx
      - src/app/orders/new/page.tsx
      - src/app/orders/[id]/page.tsx
      - src/app/orders/[id]/edit/page.tsx
      - src/app/orders/[id]/invoice/page.tsx
    entry_route: /orders
    user_interactions:
      - View orders list in data table
      - Search orders by name or customer name
      - Open filter panel and filter by branch, status, type, date range
      - Clear all filters
      - Click new order button to create
      - Click order name link to view detail
      - Click edit button on order row
      - Click invoice button to print
      - Click delete button (admin only) with confirmation dialog
      - Navigate pagination pages
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/orders?limit=500
      - method: GET
        endpoint: /api/branches?limit=500
      - method: DELETE
        endpoint: /api/orders/{id}
    auth_required: true
  - name: Customers Management
    description: "CRUD for customers - list, search, create, view detail, inline edit, export to Excel"
    files:
      - src/app/customers/page.tsx
      - src/app/customers/new/page.tsx
      - src/app/customers/[id]/page.tsx
    entry_route: /customers
    user_interactions:
      - View customers list in data table
      - Search customers by name
      - Click new customer button to create
      - Click customer name to view detail
      - Inline edit customer fields
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/customers?limit=500
      - method: GET
        endpoint: /api/branches?limit=500
      - method: GET
        endpoint: /api/orders?limit=500
    auth_required: true
  - name: Suppliers Management
    description: "CRUD for suppliers - list, search, create, view detail, inline edit, export to Excel"
    files:
      - src/app/suppliers/page.tsx
      - src/app/suppliers/new/page.tsx
      - src/app/suppliers/[id]/page.tsx
    entry_route: /suppliers
    user_interactions:
      - View suppliers list in data table
      - Search suppliers by name
      - Click new supplier button to create
      - Click supplier name to view detail
      - Inline edit supplier fields including payment type
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/suppliers?limit=500
    auth_required: true
  - name: Branches Management
    description: "CRUD for branches/showrooms - list, search, create, view detail, inline edit, export to Excel"
    files:
      - src/app/branches/page.tsx
      - src/app/branches/new/page.tsx
      - src/app/branches/[id]/page.tsx
    entry_route: /branches
    user_interactions:
      - View branches list in data table
      - Search branches by name
      - Click new branch button to create
      - Click branch name to view detail
      - Inline edit branch fields
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/branches?limit=500
    auth_required: true
  - name: Workers Management
    description: "CRUD for workers - list, search, create, inline edit, view expense totals per worker, export to Excel"
    files:
      - src/app/workers/page.tsx
      - src/app/workers/new/page.tsx
    entry_route: /workers
    user_interactions:
      - View workers list in data table
      - Search workers by name
      - Click new worker button to create
      - Inline edit worker fields
      - View expense totals per worker
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/workers?limit=500
      - method: GET
        endpoint: /api/overhead?limit=2000
    auth_required: true
  - name: Contractors Management
    description: "CRUD for contractors - list, search, create, view detail, inline edit, export to Excel"
    files:
      - src/app/contractors/page.tsx
      - src/app/contractors/new/page.tsx
      - src/app/contractors/[id]/page.tsx
    entry_route: /contractors
    user_interactions:
      - View contractors list in data table
      - Search contractors by name
      - Click new contractor button to create
      - Click contractor name to view detail
      - Inline edit contractor fields
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/contractors?limit=500
    auth_required: true
  - name: Accessories Inventory
    description: "CRUD for accessories inventory - list, search, create, view detail, inline edit, buy/purchase, export to Excel"
    files:
      - src/app/accessories/page.tsx
      - src/app/accessories/new/page.tsx
      - src/app/accessories/buy/page.tsx
      - src/app/accessories/[id]/page.tsx
    entry_route: /accessories
    user_interactions:
      - View accessories list in data table
      - Search accessories by name or code
      - Click new accessory button to create
      - Click buy button to add inventory from supplier
      - Click accessory name to view detail
      - Inline edit accessory fields
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/accessories?limit=500
      - method: GET
        endpoint: /api/suppliers?limit=500
    auth_required: true
  - name: Boards Inventory
    description: "CRUD for boards inventory - list, search, create, view detail, inline edit, buy/purchase, export to Excel"
    files:
      - src/app/boards/page.tsx
      - src/app/boards/new/page.tsx
      - src/app/boards/buy/page.tsx
      - src/app/boards/[id]/page.tsx
    entry_route: /boards
    user_interactions:
      - View boards list in data table
      - Search boards by name or code
      - Click new board button to create
      - Click buy button to add inventory from supplier
      - Click board name to view detail
      - Inline edit board fields
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/boards?limit=500
      - method: GET
        endpoint: /api/suppliers?limit=500
    auth_required: true
  - name: Journal (Financial Entries)
    description: "Financial journal entries - list, filter by type/order/date, create, view, summary report"
    files:
      - src/app/journal/page.tsx
      - src/app/journal/new/page.tsx
      - src/app/journal/summary/page.tsx
      - src/app/_journal-page-wrapper.tsx
    entry_route: /journal
    user_interactions:
      - View journal entries list in data table
      - Filter entries by type, order, date range
      - Toggle filter panel open/close
      - Click new journal entry button to create
      - View journal summary report
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/journal?limit=500
    auth_required: true
  - name: Overhead Expenses
    description: "CRUD for overhead expenses - list, search, date filter, create, inline edit, export to Excel"
    files:
      - src/app/overhead/page.tsx
      - src/app/overhead/new/page.tsx
    entry_route: /overhead
    user_interactions:
      - View overhead expenses list in data table
      - Search expenses by description
      - Filter by date range
      - Click new expense button to create
      - Inline edit expense fields
      - Export to Excel
    api_calls:
      - method: GET
        endpoint: /api/overhead?limit=500
    auth_required: true
  - name: Reports
    description: "Generate various reports - inventory, orders, cashflow, suppliers, overhead, workers with date filtering and Excel export"
    files:
      - src/app/reports/page.tsx
    entry_route: /reports
    user_interactions:
      - Select report type from dropdown
      - Set from/to date filters
      - Click generate button to fetch report data
      - View report results in table
      - Export report to Excel
    api_calls:
      - method: GET
        endpoint: /api/boards?limit=500
      - method: GET
        endpoint: /api/accessories?limit=500
      - method: GET
        endpoint: /api/orders?limit=500
      - method: GET
        endpoint: /api/journal?limit=500
      - method: GET
        endpoint: /api/suppliers?limit=500
      - method: GET
        endpoint: /api/overhead?limit=500
      - method: GET
        endpoint: /api/workers?limit=500
    auth_required: true
  - name: User Profile and Change Password
    description: "View user profile info and change password with validation"
    files:
      - src/app/profile/page.tsx
    entry_route: /profile
    user_interactions:
      - View current user profile information
      - Fill current password field
      - Fill new password field
      - Fill confirm password field
      - Toggle show/hide password
      - Click change password button
      - See success/error messages
    api_calls:
      - method: POST
        endpoint: /api/auth/change-password
    auth_required: true
  - name: Admin User Management
    description: "Admin can create, edit, activate/deactivate users, set roles, branches, visible modules"
    files:
      - src/app/admin/users/page.tsx
    entry_route: /admin/users
    user_interactions:
      - View users list
      - Click create new user button
      - Fill user creation form (username, contact, role, branch, modules)
      - Edit existing user details
      - Toggle user active/inactive status
      - Delete user
    api_calls:
      - method: GET
        endpoint: /api/admin/users
      - method: POST
        endpoint: /api/admin/create-user
    auth_required: true
  - name: Admin Material Types
    description: "Admin can create and edit material types for boards and accessories categories"
    files:
      - src/app/admin/material-types/page.tsx
    entry_route: /admin/material-types
    user_interactions:
      - View material types list
      - Filter by category (boards or accessories)
      - Create new material type
      - Edit existing material type
    api_calls:
      - method: GET
        endpoint: /api/material-types?limit=500
    auth_required: true
known_limitations:
  - issue: "Order detail and edit pages have had 500 errors reported in recent commits"
    location: "src/app/orders/[id]/page.tsx, src/app/orders/[id]/edit/page.tsx"
    impact: "Users may not be able to view or edit order details"
  - issue: "Accessories form was modified to remove type and code fields, may cause form validation issues"
    location: "src/app/accessories/new/page.tsx"
    impact: "Creating new accessories may fail or have missing required fields"
  - issue: "start_date field had errors that were fixed in recent commits"
    location: "src/app/orders/new/page.tsx"
    impact: "Creating orders with start dates may have issues"
  - issue: "Dev server runs on port 3001 (not default 3000) possibly due to port conflict"
    location: "package.json"
    impact: "Local development may need port adjustment"
